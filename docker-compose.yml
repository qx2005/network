# One-command stack: web (nginx host :7777) + api (host :3000).
# 一键启动：浏览器访问 http://localhost:7777

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: network-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Comma-separated extra CORS origins (direct API access from host).
      CORS_ORIGINS: "http://localhost:7777,http://127.0.0.1:7777"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: network-web
    ports:
      - "7777:80"
    depends_on:
      - api
